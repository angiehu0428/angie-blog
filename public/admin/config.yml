# ─────────────────────────────────────────────────────────────
# Angie's Blog 內容後台設定 (Sveltia CMS)
#
# ▸ 正式後台:https://angiehu.com/admin/ → 用 GitHub 登入(angiehu0428)
#   存檔會 commit 到 GitHub → Cloudflare 自動重新部署(幾分鐘生效)。
# ▸ 本機測試:npm run dev → http://localhost:4321/admin/index.html
#   → 選「Work with Local Repository」→ 授權 angie-blog 資料夾。
# ▸ 注意:Sveltia 與舊版 Decap 有相容性差異(例如不支援 allow_multiple、
#   select 尚不能動態新增選項,所以分類用自由輸入的 list)。
# ─────────────────────────────────────────────────────────────

backend:
  name: github
  repo: angiehu0428/angie-blog
  branch: main
  base_url: https://sveltia-cms-auth.angiehu.workers.dev

# 上傳的圖片/檔案(例如 ICRT mp3)會放到這裡,網址是 /uploads/檔名
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "文章"
    label_singular: "一篇文章"
    description: "新增或編輯部落格文章"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    sortable_fields: ["pubDate", "title"]
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "摘要(顯示在列表與 Google 搜尋)", name: "description", widget: "text" }
      - { label: "Banner 圖(選填,顯示在文章頂部與首頁卡片)", name: "heroImage", widget: "image", required: false }
      - {
          label: "發布日期",
          name: "pubDate",
          widget: "datetime",
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - {
          label: "分類標籤(自由輸入,打完一個按 Enter;新分類會自動出現在 Blog 篩選列)",
          name: "tags",
          widget: "list",
          required: false,
          hint: "現有分類:IP相關、美術相關、個人成長、身心靈。沿用時請打一模一樣的字,才會歸在同一類。",
        }
      - {
          label: "SEO 關鍵字(選填,中英文都放)",
          name: "keywords",
          widget: "list",
          required: false,
          hint: "想像別人會在 Google 或問 AI 時打什麼字",
        }
      - {
          label: "內文",
          name: "body",
          widget: "markdown",
          hint: "圖片/GIF 直接插入;影片(mp4)與音檔(mp3)先上傳,再用插入圖片的方式選它,會自動變成播放器;YouTube 連結單獨貼一行會自動嵌入影片。",
        }

  # ── AI 工具:每個工具一頁,含介紹與截圖 ──
  - name: "tools"
    label: "AI 工具"
    label_singular: "一個工具"
    description: "每個工具有自己的介紹頁(首頁卡片自動同步)"
    folder: "src/content/tools"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    sortable_fields: ["order", "name"]
    fields:
      - { label: "工具名稱", name: "name", widget: "string" }
      - { label: "Emoji 圖示", name: "icon", widget: "string", default: "🛠️" }
      - { label: "標籤(例如 AI · 記帳)", name: "tag", widget: "string", required: false }
      - { label: "一句介紹(顯示在首頁卡片)", name: "desc", widget: "text" }
      - { label: "封面截圖(選填,顯示在介紹頁頂部)", name: "cover", widget: "image", required: false }
      - label: "功能點(顯示成 ✓ 清單)"
        name: "features"
        widget: "list"
        required: false
      - { label: "工具網址(內部工具可留空)", name: "href", widget: "string", required: false }
      - {
          label: "狀態",
          name: "status",
          widget: "select",
          options:
            [
              { label: "公開(可點開使用)", value: "live" },
              { label: "開發中(只介紹、顯示「對外版本開發中」)", value: "soon" },
              { label: "公司內部工具(只介紹、標內部工具)", value: "internal" },
            ],
          default: "live",
          hint: "選『開發中』或『內部』的工具:只會顯示功能介紹,不會給可點開的連結。",
        }
      - { label: "排序(數字小的排前面)", name: "order", widget: "number", value_type: "int", default: 99 }
      - {
          label: "分類(首頁篩選用,可多個)",
          name: "tags",
          widget: "list",
          required: false,
          hint: "現有分類:記帳理財、掃描自動化、AI 生活、設計工具、公司工具。沿用請打一模一樣的字;打新的會自動變成新分類。",
        }
      - {
          label: "SEO 關鍵字(中英文都放,打完一個按 Enter)",
          name: "keywords",
          widget: "list",
          required: false,
          hint: "想像別人會在 Google 或問 AI 時打什麼字,例如:pantone converter、旅遊記帳 app",
        }
      - {
          label: "使用介紹(可插入截圖/GIF/影片)",
          name: "body",
          widget: "markdown",
          hint: "圖片/GIF 直接插入;影片(mp4)與音檔(mp3)上傳後用插入圖片的方式選它會自動變播放器;YouTube 連結單獨貼一行會自動嵌入。",
        }

  # ── 全站設定:站名、導覽列、頁尾、社群連結 ──
  - name: "settings"
    label: "全站設定"
    files:
      - name: "site"
        label: "網站設定"
        file: "src/data/site.json"
        fields:
          - { label: "網站名稱", name: "title", widget: "string" }
          - { label: "網站描述(SEO)", name: "description", widget: "text" }
          - label: "導覽列連結(可拖曳排序)"
            name: "nav"
            widget: "list"
            fields:
              - { label: "文字", name: "label", widget: "string" }
              - { label: "連結", name: "href", widget: "string" }
              - { label: "外部連結(新分頁開啟、顯示 ↗)", name: "external", widget: "boolean", default: false }
          - { label: "「找我合作」按鈕文字(留空=不顯示)", name: "ctaLabel", widget: "string", required: false }
          - { label: "「找我合作」按鈕連結(例如 Calendly)", name: "ctaHref", widget: "string", required: false }
          - { label: "頁尾版權文字(年份會自動加)", name: "footerText", widget: "string" }
          - label: "頁尾社群連結"
            name: "socials"
            widget: "list"
            fields:
              - { label: "名稱", name: "label", widget: "string" }
              - { label: "網址", name: "url", widget: "string" }

  # ── 頁面排版:一塊塊「區塊」,可新增/刪除/拖曳排序 ──
  - name: "pages"
    label: "頁面排版"
    files:
      - name: "home"
        label: "首頁"
        file: "src/data/home.json"
        description: "拖曳左邊的把手可調整區塊順序;右上角可新增區塊"
        fields:
          - label: "區塊(拖曳排序)"
            name: "blocks"
            label_singular: "區塊"
            widget: "list"
            types:
              - label: "Hero 大標區(柔和科技風)"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "上方小標(kicker)", name: "kicker", widget: "string", required: false }
                  - label: "定位句(拖曳排序,句中可插色塊標籤)"
                    name: "statement"
                    widget: "list"
                    hint: "把一整句話拆成好幾段;不需要標籤的段落「標籤顏色」選「無」即可"
                    fields:
                      - { label: "文字", name: "text", widget: "string" }
                      - {
                          label: "標籤顏色",
                          name: "chip",
                          widget: "select",
                          required: false,
                          options: [{ label: "無(一般文字)", value: "" }, { label: "藍色", value: "peri" }, { label: "蜜桃色", value: "peach" }],
                        }
                  - { label: "英文副標(標題下方小字)", name: "enSubtitle", widget: "string", required: false }
                  - label: "時間膠囊(拖曳排序)"
                    name: "chips"
                    widget: "list"
                    required: false
                    fields:
                      - { label: "年份", name: "year", widget: "string" }
                      - { label: "文字", name: "text", widget: "string" }
                  - { label: "主按鈕文字", name: "primaryLabel", widget: "string", required: false }
                  - { label: "主按鈕連結", name: "primaryHref", widget: "string", required: false }
                  - { label: "次按鈕文字", name: "ghostLabel", widget: "string", required: false }
                  - { label: "次按鈕連結", name: "ghostHref", widget: "string", required: false }
                  - { label: "CREDITS 列(媒體/合作名)", name: "credits", widget: "list", required: false }
                  - { label: "漂浮徽章:前段", name: "badge", widget: "string", required: false }
                  - { label: "漂浮徽章:亮色字", name: "badgeBold", widget: "string", required: false }
                  - { label: "主視覺圖(4:5,建議 800×1000 以上)", name: "heroImage", widget: "image", required: false, hint: "沒上傳時會顯示漸層佔位" }
                  - { label: "概念藝術小卡圖(16:10)", name: "conceptImage", widget: "image", required: false, hint: "沒上傳時會顯示漸層佔位" }
                  - { label: "概念藝術小卡圖說(版權/測試稿標註等)", name: "conceptCredit", widget: "string", required: false }
              - label: "AI 工具牆"
                name: "tools"
                widget: "object"
                fields:
                  - { label: "標題", name: "heading", widget: "string" }
                  - { label: "副標", name: "subtitle", widget: "string", required: false, hint: "工具卡片內容請到左邊選單的「AI 工具」編輯(每個工具有自己的介紹頁)" }
                  - { label: "提示小字(可留空)", name: "note", widget: "string", required: false }
              - label: "最新文章"
                name: "latestPosts"
                widget: "object"
                fields:
                  - { label: "標題", name: "heading", widget: "string" }
                  - { label: "顯示幾篇", name: "count", widget: "number", default: 3, value_type: "int" }
              - label: "文字區塊"
                name: "richText"
                widget: "object"
                fields:
                  - { label: "標題(可留空)", name: "heading", widget: "string", required: false }
                  - { label: "內文", name: "body", widget: "markdown" }
              - label: "行動呼籲 CTA"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "標題", name: "heading", widget: "string" }
                  - { label: "說明", name: "text", widget: "text", required: false }
                  - { label: "按鈕文字", name: "buttonLabel", widget: "string", required: false }
                  - { label: "按鈕連結", name: "buttonHref", widget: "string", required: false }

      - name: "about"
        label: "關於頁"
        file: "src/data/about.json"
        description: "關於頁的內容區塊,可拖曳排序、新增、刪除"
        fields:
          - { label: "頁面標題", name: "title", widget: "string" }
          - { label: "頁面描述(SEO)", name: "description", widget: "text" }
          - label: "區塊(拖曳排序)"
            name: "blocks"
            label_singular: "區塊"
            widget: "list"
            types:
              - label: "文字區塊"
                name: "richText"
                widget: "object"
                fields:
                  - { label: "標題(可留空)", name: "heading", widget: "string", required: false }
                  - { label: "內文", name: "body", widget: "markdown" }
              - label: "顧問客戶(標籤牆)"
                name: "clients"
                widget: "object"
                fields:
                  - { label: "標題", name: "heading", widget: "string" }
                  - { label: "說明(可留空)", name: "intro", widget: "string", required: false }
                  - { label: "客戶名單(可拖曳排序)", name: "items", widget: "list" }
              - label: "圖片(含說明)"
                name: "figure"
                widget: "object"
                fields:
                  - { label: "圖片", name: "image", widget: "image" }
                  - { label: "圖說(可留空)", name: "caption", widget: "string", required: false }
              - label: "音檔播放器"
                name: "audio"
                widget: "object"
                fields:
                  - { label: "標題", name: "title", widget: "string", required: false }
                  - { label: "音檔(mp3,上傳後自動顯示播放器)", name: "file", widget: "file", required: false }
                  - { label: "還沒上傳時顯示的文字", name: "note", widget: "string", required: false }
              - label: "連結清單"
                name: "links"
                widget: "object"
                fields:
                  - { label: "標題", name: "heading", widget: "string", required: false }
                  - label: "連結(可拖曳排序)"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "顯示文字", name: "label", widget: "string" }
                      - { label: "網址", name: "url", widget: "string" }

      - name: "consulting"
        label: "顧問諮詢頁"
        file: "src/data/consulting.json"
        description: "顧問諮詢頁的資歷、諮詢領域、價位方案、預約說明"
        fields:
          - { label: "頁面標題", name: "title", widget: "string" }
          - { label: "開頭介紹", name: "intro", widget: "text" }
          - label: "資歷區"
            name: "credentials"
            widget: "object"
            fields:
              - { label: "區塊標題", name: "heading", widget: "string" }
              - label: "資歷卡(可拖曳排序)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Emoji 圖示", name: "icon", widget: "string" }
                  - { label: "小標", name: "title", widget: "string" }
                  - { label: "說明", name: "text", widget: "text" }
          - label: "諮詢領域區"
            name: "areas"
            widget: "object"
            fields:
              - { label: "區塊標題", name: "heading", widget: "string" }
              - label: "領域卡(可拖曳排序)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Emoji 圖示", name: "icon", widget: "string" }
                  - { label: "小標", name: "title", widget: "string" }
                  - { label: "說明", name: "desc", widget: "text" }
          - label: "價位區"
            name: "pricing"
            widget: "object"
            fields:
              - { label: "區塊標題", name: "heading", widget: "string" }
              - { label: "小字說明(可留空)", name: "note", widget: "text", required: false }
              - label: "方案(可拖曳排序)"
                name: "tiers"
                widget: "list"
                fields:
                  - { label: "方案名稱", name: "name", widget: "string" }
                  - { label: "計費方式標籤(例如 按小時計費 / 月費制)", name: "label", widget: "string", required: false }
                  - { label: "方案說明", name: "desc", widget: "text", required: false }
                  - { label: "包含項目(每行一項,一般人就看得到)", name: "included", widget: "list", required: false }
                  - { label: "標記為「最多人選」(醒目框)", name: "highlight", widget: "boolean", default: false }
          - label: "預約區"
            name: "cta"
            widget: "object"
            fields:
              - { label: "標題", name: "heading", widget: "string" }
              - { label: "說明", name: "text", widget: "text" }
              - { label: "按鈕文字", name: "buttonLabel", widget: "string" }
              - { label: "按鈕連結", name: "buttonHref", widget: "string" }
